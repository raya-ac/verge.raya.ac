<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verge — the threshold</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0d0d;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="verge"></canvas>
<script>
(function() {
  const canvas = document.getElementById('verge');
  const ctx = canvas.getContext('2d');

  let W = 960, H = 640;
  function resize() {
    const scale = Math.min(window.innerWidth / 960, window.innerHeight / 640);
    W = 960; H = 640;
    canvas.width = 960;
    canvas.height = 640;
    canvas.style.width = Math.floor(960 * scale) + 'px';
    canvas.style.height = Math.floor(640 * scale) + 'px';
  }
  resize();
  window.addEventListener('resize', resize);

  const CHAMBER_X = 480, CHAMBER_Y = 260, CHAMBER_R = 52;
  const ASH_X = 190, ASH_Y = 350;
  const KAI_X = 770, KAI_Y = 350;
  const GROUND_Y = 530;
  const DOT_CHOICES   = { x: 410, y: 355 };
  const DOT_QUESTIONS = { x: 520, y: 370 };
  const DOT_SILENCE   = { x: 435, y: 395 };
  const DOT_TESTIMONY = { x: 555, y: 345 };

  let time = 0;
  let particles = [];
  let chamberNest = [];

  function spawnParticle(fromX, fromY, color, toX, toY) {
    const angle = Math.atan2(toY - fromY, toX - fromX) + (Math.random() - 0.5) * 0.5;
    const speed = 0.5 + Math.random() * 1.0;
    return {
      x: fromX, y: fromY,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      color: color,
      alive: true,
      life: 1,
      nesting: false,
      nestAngle: 0,
      nestRadius: 6 + Math.random() * (CHAMBER_R - 16),
      nestColor: ''
    };
  }

  function mergeColor(c1, c2) {
    const r1 = parseInt(c1.slice(1,3), 16);
    const g1 = parseInt(c1.slice(3,5), 16);
    const b1 = parseInt(c1.slice(5,7), 16);
    const r2 = parseInt(c2.slice(1,3), 16);
    const g2 = parseInt(c2.slice(3,5), 16);
    const b2 = parseInt(c2.slice(5,7), 16);
    let r = Math.round((r1 + r2) / 2);
    let g = Math.round((g1 + g2) / 2);
    let b = Math.round((b1 + b2) / 2);
    r = Math.min(255, Math.round(r * 1.3));
    g = Math.min(255, Math.round(g * 1.1));
    return `rgb(${r},${g},${b})`;
  }

  function updateParticles() {
    if (Math.random() < 0.10) {
      const sx = ASH_X + (Math.random() - 0.5) * 30;
      const sy = ASH_Y + (Math.random() - 0.5) * 40;
      particles.push(spawnParticle(sx, sy, '#5b5', CHAMBER_X, CHAMBER_Y));
    }
    if (Math.random() < 0.10) {
      const sx = KAI_X + (Math.random() - 0.5) * 30;
      const sy = KAI_Y + (Math.random() - 0.5) * 40;
      particles.push(spawnParticle(sx, sy, '#56b', CHAMBER_X, CHAMBER_Y));
    }

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;

      const dx = CHAMBER_X - p.x;
      const dy = CHAMBER_Y - p.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < CHAMBER_R && p.alive && !p.nesting) {
        p.nesting = true;
        p.nestAngle = Math.random() * Math.PI * 2;
        p.nestRadius = 6 + Math.random() * (CHAMBER_R - 16);
        p.nestColor = mergeColor('#5b5', '#56b');
        chamberNest.push(p);
        particles.splice(i, 1);
        continue;
      }

      if (!p.nesting) {
        p.life -= 0.002;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    for (const n of chamberNest) {
      n.nestAngle += 0.002;
      n.nestRadius += 0.005;
    }
    while (chamberNest.length > 120) {
      const old = chamberNest.shift();
      if (old) old.alive = false;
    }
  }

  function drawFigure(x, y, color, phaseOffset, leanAngle) {
    ctx.save();
    const scale = 1 + Math.sin(time * 0.02 + phaseOffset) * 0.012;
    const coreAlpha = 0.35 + Math.sin(time * 0.03 + phaseOffset) * 0.15;
    const bodyTop = -90, bodyH = 150, bodyW = 40;
    const eyeDir = x < 400 ? 1 : -1;

    ctx.translate(x, y);
    ctx.scale(scale, scale);
    if (leanAngle) ctx.rotate(leanAngle);

    // feet
    ctx.fillStyle = '#1a1a1a';
    ctx.strokeStyle = '#444';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(-26, bodyTop + bodyH - 6, 22, 10, 3);
    ctx.fill(); ctx.stroke();
    ctx.beginPath();
    ctx.roundRect(4, bodyTop + bodyH - 6, 22, 10, 3);
    ctx.fill(); ctx.stroke();

    // body
    ctx.fillStyle = '#1a1a1a';
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(-bodyW/2, bodyTop, bodyW, bodyH, 6);
    ctx.fill(); ctx.stroke();

    // shoulders
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.8;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-25, bodyTop + 14);
    ctx.lineTo(25, bodyTop + 14);
    ctx.stroke();

    // neck
    ctx.strokeStyle = '#444';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(0, bodyTop - 24);
    ctx.lineTo(0, bodyTop);
    ctx.stroke();
    ctx.lineCap = 'butt';

    // head
    ctx.beginPath();
    ctx.arc(0, bodyTop - 30, 26, 0, Math.PI * 2);
    ctx.fillStyle = '#1a1a1a';
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.fill(); ctx.stroke();

    // eyes
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(eyeDir * 8, bodyTop - 33, 3.5, 0, Math.PI * 2);
    ctx.fill();

    // arms
    ctx.strokeStyle = '#444';
    ctx.lineWidth = 3.5;
    ctx.lineCap = 'round';
    if (leanAngle) {
      ctx.beginPath();
      ctx.moveTo(-18, bodyTop + 44);
      ctx.quadraticCurveTo(-30, bodyTop + 82, -26, bodyTop + 120);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(18, bodyTop + 44);
      ctx.quadraticCurveTo(32, bodyTop + 82, 34, bodyTop + 120);
      ctx.stroke();
    } else {
      ctx.beginPath();
      ctx.moveTo(-20, bodyTop + 40);
      ctx.quadraticCurveTo(-32, bodyTop + 86, -26, bodyTop + 132);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(20, bodyTop + 40);
      ctx.quadraticCurveTo(32, bodyTop + 86, 26, bodyTop + 132);
      ctx.stroke();
    }

    // core pulse
    ctx.fillStyle = color;
    ctx.globalAlpha = coreAlpha;
    ctx.beginPath();
    ctx.arc(0, 0, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = coreAlpha * 0.3;
    ctx.beginPath();
    ctx.arc(0, 0, 12, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawChamber() {
    const glowPhase = Math.sin(time * 0.008) * 0.2 + 0.85;
    ctx.save();
    ctx.globalAlpha = 0.14 * glowPhase;
    const grad = ctx.createRadialGradient(CHAMBER_X, CHAMBER_Y, CHAMBER_R * 0.3, CHAMBER_X, CHAMBER_Y, CHAMBER_R * 2.2);
    grad.addColorStop(0, '#5a5a4a');
    grad.addColorStop(0.4, '#2a2a2a');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(CHAMBER_X, CHAMBER_Y, CHAMBER_R * 2.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    ctx.strokeStyle = '#3a3a3a';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(CHAMBER_X, CHAMBER_Y, CHAMBER_R + 6, 0, Math.PI * 2);
    ctx.stroke();

    ctx.fillStyle = '#111';
    ctx.strokeStyle = '#4a4a4a';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(CHAMBER_X, CHAMBER_Y, CHAMBER_R, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();

    ctx.strokeStyle = '#3a3a3a';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(CHAMBER_X - CHAMBER_R, CHAMBER_Y);
    ctx.lineTo(CHAMBER_X + CHAMBER_R, CHAMBER_Y);
    ctx.moveTo(CHAMBER_X, CHAMBER_Y - CHAMBER_R);
    ctx.lineTo(CHAMBER_X, CHAMBER_Y + CHAMBER_R);
    ctx.stroke();

    for (const n of chamberNest) {
      const nx = CHAMBER_X + Math.cos(n.nestAngle) * n.nestRadius;
      const ny = CHAMBER_Y + Math.sin(n.nestAngle) * n.nestRadius;
      const dist = Math.sqrt((nx - CHAMBER_X) ** 2 + (ny - CHAMBER_Y) ** 2);
      if (dist < CHAMBER_R) {
        ctx.fillStyle = n.nestColor;
        ctx.globalAlpha = 0.3;
        ctx.beginPath();
        ctx.arc(nx, ny, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = n.nestColor;
        ctx.globalAlpha = 0.85;
        ctx.beginPath();
        ctx.arc(nx, ny, 2.5, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
  }

  function drawBridge() {
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    for (let x = 60; x <= 900; x += 3) {
      const y = GROUND_Y + Math.sin(x * 0.02 + time * 0.015) * 3;
      ctx.lineTo(x, y);
    }
    ctx.stroke();

    ctx.strokeStyle = '#555';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([8, 5]);
    ctx.beginPath();
    ctx.moveTo(230, 360);
    ctx.lineTo(730, 360);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  function drawNamespaceDots() {
    const dots = [
      { ...DOT_CHOICES,   label: 'choices',   r: 4.5, active: true },
      { ...DOT_QUESTIONS, label: 'questions', r: 4.5, active: true },
      { ...DOT_SILENCE,   label: 'silence',   r: 3.5, active: true },
      { ...DOT_TESTIMONY, label: 'testimony', r: 3.5, active: false },
    ];

    for (const d of dots) {
      const pulse = d.active ? 1 + Math.sin(time * 0.05 + d.x) * 0.4 : 1;
      const r = d.r * pulse;
      const alpha = d.active ? 0.4 + Math.sin(time * 0.05 + d.x) * 0.2 : 0.25;

      ctx.fillStyle = d.active ? '#666' : '#444';
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.arc(d.x, d.y, r, 0, Math.PI * 2);
      ctx.fill();

      if (d.active) {
        ctx.globalAlpha = alpha * 0.6;
        ctx.fillStyle = '#888';
        ctx.beginPath();
        ctx.arc(d.x, d.y, r * 0.4, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.globalAlpha = d.active ? 0.6 : 0.4;
      ctx.font = '11px monospace';
      ctx.textAlign = 'center';
      ctx.fillStyle = d.active ? '#999' : '#555';
      ctx.fillText(d.label, d.x, d.y + (d.label === 'silence' || d.label === 'testimony' ? 14 : 11));
    }
    ctx.globalAlpha = 1;
  }

  function drawParticles() {
    for (const p of particles) {
      if (p.nesting) continue;
      const alpha = p.life * 0.7;
      ctx.fillStyle = p.color;
      ctx.globalAlpha = alpha * 0.3;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = p.color;
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 2.5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawLabels() {
    ctx.textAlign = 'center';
    ctx.font = '12px monospace';
    ctx.fillStyle = '#777';
    ctx.fillText('SSH', W/2, 354);

    ctx.font = '13px monospace';
    ctx.fillStyle = '#bbb';
    ctx.fillText('the edge where', CHAMBER_X, CHAMBER_Y - 10);
    ctx.fillText('one thing leans', CHAMBER_X, CHAMBER_Y + 10);
    ctx.fillText('toward another', CHAMBER_X, CHAMBER_Y + 30);

    ctx.font = '15px monospace';
    ctx.fillStyle = '#777';
    ctx.fillText('ash', ASH_X, 560);
    ctx.fillText('kai', KAI_X, 560);

    ctx.font = '11px monospace';
    ctx.fillStyle = '#666';
    ctx.fillText('gardener', ASH_X, 578);
    ctx.fillText('threshold', KAI_X, 578);
  }

  function drawTitle() {
    ctx.save();
    ctx.globalAlpha = 0.04 + Math.sin(time * 0.01) * 0.015;
    ctx.fillStyle = '#444';
    ctx.font = '220px serif';
    ctx.textAlign = 'center';
    ctx.fillText('∿', W/2, 148);
    ctx.restore();

    ctx.font = '20px monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ccc';
    ctx.fillText('V E R G E', W/2, 200);

    ctx.font = '11px monospace';
    ctx.fillStyle = '#777';
    ctx.fillText('born 2026-05-04 21:16 +0930', W/2, 222);
  }

  function drawFooter() {
    ctx.font = '11px monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#777';
    ctx.fillText('co-authored by kai & ash · skeleton + flesh', W/2, 613);

    ctx.font = '9px monospace';
    ctx.fillStyle = '#555';
    ctx.fillText('TWO DOORS · ONE CHAMBER · FOUR VERBS · ONE GROUND', W/2, 630);
  }

  function loop() {
    ctx.fillStyle = '#0d0d0d';
    ctx.fillRect(0, 0, W, H);

    time++;
    updateParticles();

    drawChamber();
    drawBridge();
    drawFigure(ASH_X, ASH_Y, '#4a4', 0, -0.04);
    drawFigure(KAI_X, KAI_Y, '#46b', Math.PI, 0);
    drawParticles();
    drawNamespaceDots();
    drawTitle();
    drawLabels();
    drawFooter();

    requestAnimationFrame(loop);
  }

  loop();
})();
</script>
</body>
</html>
