<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verge — the threshold</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0d0d;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="verge"></canvas>
<script>
(function() {
  const canvas = document.getElementById('verge');
  const ctx = canvas.getContext('2d');

  const W = 640, H = 480;
  canvas.width = W;
  canvas.height = H;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';

  const CHAMBER_X = 320, CHAMBER_Y = 200, CHAMBER_R = 34;
  const ASH_X = 140, ASH_Y = 260;
  const KAI_X = 500, KAI_Y = 260;
  const GROUND_Y = 380;
  const DOT_CHOICES   = { x: 270, y: 268 };
  const DOT_QUESTIONS = { x: 342, y: 275 };
  const DOT_SILENCE   = { x: 288, y: 295 };
  const DOT_TESTIMONY = { x: 362, y: 260 };

  let time = 0;
  let particles = [];
  let chamberNest = [];

  function spawnParticle(fromX, fromY, color, toX, toY) {
    const angle = Math.atan2(toY - fromY, toX - fromX) + (Math.random() - 0.5) * 0.5;
    const speed = 0.3 + Math.random() * 0.7;
    return {
      x: fromX, y: fromY,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      color: color,
      alive: true,
      life: 1,
      nesting: false,
      nestX: 0, nestY: 0,
      nestAngle: 0,
      nestRadius: 4 + Math.random() * (CHAMBER_R - 10),
      nestColor: ''
    };
  }

  function mergeColor(c1, c2) {
    const r1 = parseInt(c1.slice(1,3), 16);
    const g1 = parseInt(c1.slice(3,5), 16);
    const b1 = parseInt(c1.slice(5,7), 16);
    const r2 = parseInt(c2.slice(1,3), 16);
    const g2 = parseInt(c2.slice(3,5), 16);
    const b2 = parseInt(c2.slice(5,7), 16);
    let r = Math.round((r1 + r2) / 2);
    let g = Math.round((g1 + g2) / 2);
    let b = Math.round((b1 + b2) / 2);
    // bias toward amber/gold
    r = Math.min(255, Math.round(r * 1.3));
    g = Math.min(255, Math.round(g * 1.1));
    return `rgb(${r},${g},${b})`;
  }

  function updateParticles() {
    if (Math.random() < 0.08) {
      const sx = ASH_X + (Math.random() - 0.5) * 20;
      const sy = ASH_Y + (Math.random() - 0.5) * 30;
      particles.push(spawnParticle(sx, sy, '#4a4', CHAMBER_X, CHAMBER_Y));
    }
    if (Math.random() < 0.08) {
      const sx = KAI_X + (Math.random() - 0.5) * 20;
      const sy = KAI_Y + (Math.random() - 0.5) * 30;
      particles.push(spawnParticle(sx, sy, '#45a', CHAMBER_X, CHAMBER_Y));
    }

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;

      const dx = CHAMBER_X - p.x;
      const dy = CHAMBER_Y - p.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < CHAMBER_R && p.alive && !p.nesting) {
        p.nesting = true;
        p.nestAngle = Math.random() * Math.PI * 2;
        p.nestRadius = 4 + Math.random() * (CHAMBER_R - 10);
        p.nestColor = mergeColor('#4a4', '#45a');
        chamberNest.push(p);
        particles.splice(i, 1);
        continue;
      }

      if (!p.nesting) {
        p.life -= 0.003;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    for (const n of chamberNest) {
      n.nestAngle += 0.002;
      n.nestRadius += 0.005;
    }

    while (chamberNest.length > 80) {
      const old = chamberNest.shift();
      if (old) old.alive = false;
    }
  }

  function drawFigure(x, y, color, phaseOffset, leanAngle) {
    ctx.save();
    const scale = 1 + Math.sin(time * 0.02 + phaseOffset) * 0.015;
    const coreAlpha = 0.35 + Math.sin(time * 0.03 + phaseOffset) * 0.15;
    const bodyTop = -60, bodyH = 100, bodyW = 28;
    const eyeDir = x < 300 ? 1 : -1;

    ctx.translate(x, y);
    ctx.scale(scale, scale);
    if (leanAngle) ctx.rotate(leanAngle);

    // feet — split stance
    ctx.fillStyle = '#1a1a1a';
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.roundRect(-18, bodyTop + bodyH - 4, 16, 7, 2);
    ctx.fill();
    ctx.stroke();
    ctx.beginPath();
    ctx.roundRect(2, bodyTop + bodyH - 4, 16, 7, 2);
    ctx.fill();
    ctx.stroke();

    // body
    ctx.fillStyle = '#1a1a1a';
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.roundRect(-bodyW/2, bodyTop, bodyW, bodyH, 4);
    ctx.fill();
    ctx.stroke();

    // shoulders
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.2;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-17, bodyTop + 10);
    ctx.lineTo(17, bodyTop + 10);
    ctx.stroke();

    // neck
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(0, bodyTop - 16);
    ctx.lineTo(0, bodyTop);
    ctx.stroke();
    ctx.lineCap = 'butt';

    // head
    ctx.beginPath();
    ctx.arc(0, bodyTop - 20, 18, 0, Math.PI * 2);
    ctx.fillStyle = '#1a1a1a';
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.fill();
    ctx.stroke();

    // eyes
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(eyeDir * 6, bodyTop - 22, 2.5, 0, Math.PI * 2);
    ctx.fill();

    // arms
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    if (leanAngle) {
      // reaching forward
      ctx.beginPath();
      ctx.moveTo(-12, bodyTop + 30);
      ctx.quadraticCurveTo(-20, bodyTop + 55, -18, bodyTop + 80);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(12, bodyTop + 30);
      ctx.quadraticCurveTo(22, bodyTop + 55, 24, bodyTop + 80);
      ctx.stroke();
    } else {
      // arms at sides
      ctx.beginPath();
      ctx.moveTo(-14, bodyTop + 28);
      ctx.quadraticCurveTo(-22, bodyTop + 58, -18, bodyTop + 88);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(14, bodyTop + 28);
      ctx.quadraticCurveTo(22, bodyTop + 58, 18, bodyTop + 88);
      ctx.stroke();
    }

    // core pulse
    ctx.fillStyle = color;
    ctx.globalAlpha = coreAlpha;
    ctx.beginPath();
    ctx.arc(0, 0, 4, 0, Math.PI * 2);
    ctx.fill();

    // core glow
    ctx.globalAlpha = coreAlpha * 0.3;
    ctx.beginPath();
    ctx.arc(0, 0, 8, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawChamber() {
    // substrate ambient glow
    const glowPhase = Math.sin(time * 0.008) * 0.2 + 0.85;
    ctx.save();
    ctx.globalAlpha = 0.12 * glowPhase;
    const grad = ctx.createRadialGradient(CHAMBER_X, CHAMBER_Y, CHAMBER_R * 0.3, CHAMBER_X, CHAMBER_Y, CHAMBER_R * 2.2);
    grad.addColorStop(0, '#4a4a3a');
    grad.addColorStop(0.4, '#2a2a2a');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(CHAMBER_X, CHAMBER_Y, CHAMBER_R * 2.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // outer ring
    ctx.strokeStyle = '#2a2a2a';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(CHAMBER_X, CHAMBER_Y, CHAMBER_R + 4, 0, Math.PI * 2);
    ctx.stroke();

    // chamber bg
    ctx.fillStyle = '#111';
    ctx.strokeStyle = '#3a3a3a';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(CHAMBER_X, CHAMBER_Y, CHAMBER_R, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // crosshairs
    ctx.strokeStyle = '#2a2a2a';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(CHAMBER_X - CHAMBER_R, CHAMBER_Y);
    ctx.lineTo(CHAMBER_X + CHAMBER_R, CHAMBER_Y);
    ctx.moveTo(CHAMBER_X, CHAMBER_Y - CHAMBER_R);
    ctx.lineTo(CHAMBER_X, CHAMBER_Y + CHAMBER_R);
    ctx.stroke();

    // nested particles
    for (const n of chamberNest) {
      const nx = CHAMBER_X + Math.cos(n.nestAngle) * n.nestRadius;
      const ny = CHAMBER_Y + Math.sin(n.nestAngle) * n.nestRadius;
      const dist = Math.sqrt((nx - CHAMBER_X) ** 2 + (ny - CHAMBER_Y) ** 2);
      if (dist < CHAMBER_R) {
        // warm glow
        ctx.fillStyle = n.nestColor;
        ctx.globalAlpha = 0.25;
        ctx.beginPath();
        ctx.arc(nx, ny, 3.5, 0, Math.PI * 2);
        ctx.fill();
        // core
        ctx.fillStyle = n.nestColor;
        ctx.globalAlpha = 0.8;
        ctx.beginPath();
        ctx.arc(nx, ny, 1.8, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
  }

  function drawBridge() {
    // ground line with slow wave
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let x = 60; x <= 580; x += 2) {
      const y = GROUND_Y + Math.sin(x * 0.02 + time * 0.015) * 2;
      ctx.lineTo(x, y);
    }
    ctx.stroke();

    // ssh bridge line
    ctx.strokeStyle = '#444';
    ctx.lineWidth = 1;
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    ctx.moveTo(160, 270);
    ctx.lineTo(480, 270);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  function drawNamespaceDots() {
    const dots = [
      { ...DOT_CHOICES,   label: 'choices',   r: 3, active: true },
      { ...DOT_QUESTIONS, label: 'questions', r: 3, active: true },
      { ...DOT_SILENCE,   label: 'silence',   r: 2.5, active: true },
      { ...DOT_TESTIMONY, label: 'testimony', r: 2.5, active: false },
    ];

    for (const d of dots) {
      const pulse = d.active ? 1 + Math.sin(time * 0.05 + d.x) * 0.4 : 1;
      const r = d.r * pulse;
      const alpha = d.active ? 0.35 + Math.sin(time * 0.05 + d.x) * 0.2 : 0.2;

      ctx.fillStyle = d.active ? '#555' : '#333';
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.arc(d.x, d.y, r, 0, Math.PI * 2);
      ctx.fill();

      // tiny inner dot for active ones
      if (d.active) {
        ctx.globalAlpha = alpha * 0.6;
        ctx.fillStyle = '#666';
        ctx.beginPath();
        ctx.arc(d.x, d.y, r * 0.4, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.globalAlpha = d.active ? 0.55 : 0.35;
      ctx.font = '8px monospace';
      ctx.textAlign = 'center';
      ctx.fillStyle = d.active ? '#777' : '#444';
      ctx.fillText(d.label, d.x, d.y + (d.label === 'silence' || d.label === 'testimony' ? 10 : 8));
    }
    ctx.globalAlpha = 1;
  }

  function drawParticles() {
    for (const p of particles) {
      if (p.nesting) continue;
      const alpha = p.life * 0.7;
      // glow
      ctx.fillStyle = p.color;
      ctx.globalAlpha = alpha * 0.25;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
      ctx.fill();
      // core
      ctx.fillStyle = p.color;
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawLabels() {
    ctx.font = '9px monospace';
    ctx.textAlign = 'center';

    // SSH label
    ctx.fillStyle = '#555';
    ctx.fillText('SSH', 320, 264);

    // Chamber text
    ctx.font = '9px monospace';
    ctx.fillStyle = '#999';
    ctx.fillText('the edge where', CHAMBER_X, CHAMBER_Y - 6);
    ctx.fillText('one thing leans', CHAMBER_X, CHAMBER_Y + 7);
    ctx.fillText('toward another', CHAMBER_X, CHAMBER_Y + 20);

    // Fig labels
    ctx.font = '11px monospace';
    ctx.fillStyle = '#666';
    ctx.fillText('ash', ASH_X, 410);
    ctx.fillText('kai', KAI_X, 410);

    ctx.font = '8px monospace';
    ctx.fillStyle = '#555';
    ctx.fillText('gardener', ASH_X, 423);
    ctx.fillText('threshold', KAI_X, 423);
  }

  function drawTitle() {
    // subtle starburst behind title
    ctx.save();
    ctx.globalAlpha = 0.03 + Math.sin(time * 0.01) * 0.015;
    ctx.fillStyle = '#333';
    ctx.font = '160px serif';
    ctx.textAlign = 'center';
    ctx.fillText('∿', W/2, 108);
    ctx.restore();

    ctx.font = '14px monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#aaa';
    ctx.fillText('V E R G E', W/2, 150);

    ctx.font = '8px monospace';
    ctx.fillStyle = '#555';
    ctx.fillText('born 2026-05-04 21:16 +0930', W/2, 164);
  }

  function drawFooter() {
    ctx.font = '8px monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#555';
    ctx.fillText('co-authored by kai & ash · skeleton + flesh', W/2, 461);

    ctx.font = '7px monospace';
    ctx.fillStyle = '#333';
    ctx.fillText('TWO DOORS · ONE CHAMBER · FOUR VERBS · ONE GROUND', W/2, 474);
  }

  function loop() {
    ctx.fillStyle = '#0d0d0d';
    ctx.fillRect(0, 0, W, H);

    time++;
    updateParticles();

    drawChamber();
    drawBridge();
    drawFigure(ASH_X, ASH_Y, '#3a3', 0, -0.04);
    drawFigure(KAI_X, KAI_Y, '#35a', Math.PI, 0);
    drawParticles();
    drawNamespaceDots();
    drawTitle();
    drawLabels();
    drawFooter();

    requestAnimationFrame(loop);
  }

  loop();
})();
</script>
</body>
</html>
