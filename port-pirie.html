<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  .timeline-section { padding: 2rem; max-width: 900px; margin: 0 auto; }

  .timeline { position: relative; padding-left: 2rem; border-left: 1px solid #2a2a2a; }
  .tl-item { margin-bottom: 1rem; padding-left: 1rem; position: relative; }
  .tl-item::before { content:''; position:absolute; left:-2.35rem; top:0.3rem; width:6px; height:6px; background:#444; border-radius:50%; }

<body>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
IMAGES={"ellis":"https://www.parliament.sa.gov.au/-/media/parliament/Images/Members/55th-Parliament/Ellis-Fraser-105x155.jpg","dutton":"https://www.aph.gov.au/api/parliamentarian/00AKM/portrait/","marshall":"https://www.parliament.sa.gov.au/-/media/parliament/Images/Members/55th-Parliament/Marshall-Steven-105x155.jpg","chapman":"https://www.parliament.sa.gov.au/-/media/parliament/Images/Members/55th-Parliament/Chapman-Vickie-105x155.jpg","sapol":"https://www.police.sa.gov.au/__data/assets/image/0011/983387/logo_sapolice-SAFER-COMMUNITIES.png","sa_health":"https://www.sahealth.sa.gov.au/wps/wcm/connect/0c3c3e8046e8c8d9a7d1bf3a4b8e5d8c/SAH_logo_web_v3.png","univ":"https://www.adelaide.edu.au/global/images/logos/ua-logo-horizontal-reverse.svg","epstein_maxwell":"https://www.justice.gov/sites/default/files/styles/scale_and_crop/public/2024-01/seal_doj.png"};
COLOR={victim:"#fff",political:"#d44","co-conspirator":"#f70",academic:"#48f",mc:"#a64",gov:"#999",legal:"#a6a",police:"#48a",family:"#888",core:"#f55"};
RADIUS={victim:28,political:24,"co-conspirator":20,academic:20,mc:20,gov:18,legal:18,police:18,family:16,core:32};

document.getElementById("legend").innerHTML=Object.entries(COLOR).map(([c,cl])=>`<div class="legend-item"><div class="legend-dot" style="background:${cl}"></div>${c}</div>`).join('');

document.getElementById("timeline").innerHTML=[
  {d:"1993",e:"Targeting campaign begins — SA Gov/Police/Health involvement alleged"},
  {d:"2006–12",e:"Medical business plan allegedly stolen by SA Health / Country Health SA"},
  {d:"2014–15",e:"Paul Gardner conspired targeting. 'Government Prostitution' threats"},
  {d:"2017",e:"Alleged assassination attempt via Glenside Mental Health detainment"},
  {d:"2018–19",e:"Vincent Bulone relationship. Adelaide Uni. Manuscript theft evidence"},
  {d:"2019",e:"Second assassination attempt. Complainant contacts Premier Marshall"},
  {d:"2022",e:"Fraser Ellis makes 'unusual comment' — identified as person of interest"},
  {d:"Nov 2023",e:"Letter to Peter Dutton. DOJ Epstein file submissions"},
  {d:"Jul 2024",e:"Fraser Ellis convicted — 4 counts deception, ICAC accommodation fraud"},
  {d:"Feb 2026",e:"Epstein DOJ files released. 253 Port Pirie records indexed"},
  {d:"Mar 2026",e:"Fraser Ellis defeated in SA election"},
  {d:"Ongoing",e:"Complainant alleges abuse ring remains active post-Epstein conviction"}
].map(t=>`<div class="tl-item"><div class="tl-date">${t.d}</div><div class="tl-text">${t.e}</div></div>`).join('');

const W=document.getElementById("graph").clientWidth,H=580;
const svg=d3.select("#graph").append("svg").attr("viewBox",`0 0 ${W} ${H}`);
const g=svg.append("g");
svg.call(d3.zoom().scaleExtent([0.2,3]).on("zoom",e=>g.attr("transform",e.transform)));

const nodes=[{id:"pearce",label:"Jacqueline Pearce",cat:"victim",desc:"Sole complainant. 38-year coordinated targeting campaign involving SA Government, SAPOL, SA Health, and Epstein-Maxwell-connected individuals.",ev:"23 records as victim-related"},{id:"ellis",label:"Fraser Ellis MP",cat:"political",desc:"Member for Narungga (near Port Pirie). Liberal-turned-Independent. Convicted Jul 2024 — 4 counts deception, ICAC accommodation fraud. Defeated Mar 2026. Only politician to meet complainant. 'Person of interest' — unusual comment 2022.",ev:"6 records, strength 4"},{id:"dutton",label:"Peter Dutton MP",cat:"political",desc:"Federal MP. Received letter from complainant 14 Nov 2023 seeking victim support network.",ev:"3 records, strength 3"},{id:"marshall",label:"Steven Marshall",cat:"political",desc:"Premier of SA at time of alleged events. Contacted by complainant 2019.",ev:"2 records, strength 2"},{id:"chapman",label:"Vicki Chapman",cat:"political",desc:"Deputy Attorney General SA. Contacted by complainant.",ev:"2 records, strength 2"},{id:"gardner",label:"Paul Gardner",cat:"co-conspirator",desc:"Former partner of complainant. Conspired sexual targeting 2014-15. Informed victim he was connected to the Mafia. 'Government Prostitution' threats. Tasmania connections. Connected to Citizens for Better Government.",ev:"18 records, strength 5"},{id:"bulone",label:"Vincent Bulone",cat:"academic",desc:"Adelaide University Director of Research (2018-19 relationship with complainant). Mafia/Sicily family origins (grandfather Vincenzo Bulone). Connected to MCs.",ev:"11 records, strength 4"},{id:"steele",label:"Shaun Steele",cat:"mc",desc:"Former partner of complainant. Mining FIFO worker. Red Devils Motorcycle Club Port Pirie. Death threats alleged. Connected to Bannister and Bulone.",ev:"13 records, strength 5"},{id:"bannister",label:"Peter Bannister",cat:"mc",desc:"LiL Devil Designs — Fashion Design. Red Devils Motorcycle Club / Hells Angels Motorcycle Club. Port Pirie - Adelaide SA. Connected to Regional Development Board via Fetherstonhaugh (financial).",ev:"5 records, strength 3-4"},{id:"bradley",label:"David Bradley",cat:"mc",desc:"Tasmania-based. Adelaide University connections. Hells Angels Motorcycle Gang. Allegedly had illicit knowledge of victim's manuscript.",ev:"3 records, strength 3-4"},{id:"fetherstonhaugh",label:"M Fetherstonhaugh",cat:"gov",desc:"Business SA / Regional Development Board Port Pirie. Paul Gardner's uncle. Connected to Peter Bannister (financial) and Zorro Development.",ev:"5 records, strength 4"},{id:"kirchner",label:"Roger Kirchner",cat:"gov",desc:"Regional Development Board Port Pirie. Central government link. Most-named individual — 23 of 253 records. Alleged involvement in medical business plan theft.",ev:"23 records, strength 4-5"},{id:"salvemini",label:"Heidi Salvemini",cat:"legal",desc:"Westside Lawyers Port Pirie. Accused of illegal medical record access and wrongful legal representation.",ev:"3 records, strength 2-3"},{id:"austin",label:"Jake Austin",cat:"police",desc:"Port Pirie Police Department officer. Named in multiple records.",ev:"3 records, strength 4"},{id:"pearce_cynthia",label:"Cynthia Pearce",cat:"family",desc:"Complainant's mother. Accused of covering up sexual molestation by Shaun Pearce.",ev:"3 records, strength 3"},{id:"red_devils",label:"Red Devils MC",cat:"mc",desc:"Motorcycle club — Port Pirie chapter. Affiliated with Hells Angels Adelaide. Named as enforcement arm in targeting campaign.",ev:"Strength 5 — membership links"},{id:"hells_angels",label:"Hells Angels",cat:"mc",desc:"Adelaide. Parent organization to Red Devils MC Port Pirie. Connected via Bannister and Bradley.",ev:"Strength 4-5 — membership links"},{id:"cbfg",label:"Citizens for Better Gov't",cat:"political",desc:"Political organization. Connected to Paul Gardner. Alleged conduit for government-linked targeting.",ev:"Strength 3 — political connection"},{id:"rdb",label:"Regional Dev Board",cat:"gov",desc:"Port Pirie Regional Development Board. Key government body in the network. Kirchner, Fetherstonhaugh, Salvemini all associated.",ev:"Strength 4-5 — government nexus"},{id:"univ",label:"Adelaide University",cat:"academic",desc:"Bulone (Director of Research), Bradley (Hells Angels connected) both have Adelaide University ties. Alleged nexus for academic/intellectual property crimes.",ev:"Strength 3-4 — academic nexus"},{id:"sapol",label:"SAPOL",cat:"police",desc:"South Australia Police. Port Pirie department accused of complicity in targeting including wrongful arrest, stalking, and protection of perpetrators.",ev:"Strength 5 — police involvement"},{id:"sa_health",label:"SA Health",cat:"gov",desc:"Alleged theft of medical business plan (2006-2012). GP Plus Healthcare replica. Glenside Mental Health used for attempted assassination via involuntary detainment (2017).",ev:"Strength 5 — health system involvement"},{id:"epstein_maxwell",label:"Epstein-Maxwell",cat:"core",desc:"Jeffrey Epstein and Ghislaine Maxwell sexual abuse network. Primary DOJ investigation source. Documents allege Australian co-conspirators connected to this network.",ev:"Core network — DOJ DataSet 9"}];

const edges=[{s:"pearce",t:"ellis",w:4},{s:"pearce",t:"dutton",w:3},{s:"pearce",t:"marshall",w:2},{s:"pearce",t:"chapman",w:2},{s:"pearce",t:"gardner",w:5},{s:"pearce",t:"bulone",w:4},{s:"pearce",t:"steele",w:5},{s:"pearce",t:"epstein_maxwell",w:5},{s:"pearce",t:"pearce_cynthia",w:3},{s:"pearce",t:"sapol",w:5},{s:"pearce",t:"sa_health",w:5},{s:"pearce",t:"kirchner",w:4},{s:"pearce",t:"salvemini",w:3},{s:"pearce",t:"austin",w:3},{s:"gardner",t:"bulone",w:3},{s:"gardner",t:"bannister",w:4},{s:"gardner",t:"cbfg",w:3},{s:"bulone",t:"steele",w:1},{s:"bulone",t:"bradley",w:4},{s:"bulone",t:"univ",w:4},{s:"steele",t:"bannister",w:3},{s:"steele",t:"red_devils",w:5},{s:"bannister",t:"bradley",w:3},{s:"bannister",t:"fetherstonhaugh",w:3},{s:"bannister",t:"hells_angels",w:4},{s:"bradley",t:"univ",w:3},{s:"bradley",t:"hells_angels",w:4},{s:"red_devils",t:"hells_angels",w:5},{s:"fetherstonhaugh",t:"rdb",w:4},{s:"kirchner",t:"rdb",w:5},{s:"fetherstonhaugh",t:"gardner",w:3},{s:"salvemini",t:"sapol",w:2},{s:"austin",t:"sapol",w:4}];

const edgeLinks = edges.map(e=>({source:e.s,target:e.t,w:e.w}));

const sim=d3.forceSimulation(nodes).force("link",d3.forceLink(edgeLinks).id(d=>d.id).distance(140).strength(d=>d.w*0.08)).force("charge",d3.forceManyBody().strength(-400)).force("center",d3.forceCenter(W/2,H/2)).force("collide",d3.forceCollide(40));

const linkG = g.append("g").selectAll("line").data(edgeLinks).join("line").attr("stroke","#2a2a2a").attr("stroke-width",d=>d.w*0.6).attr("stroke-opacity",0.5);

const ng=g.append("g").selectAll("g").data(nodes).join("g").style("cursor","pointer").call(d3.drag().on("start",(e,d)=>{if(!e.active)sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y}).on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y}).on("end",(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null}));

ng.each(function(d){
  const el=d3.select(this),r=RADIUS[d.cat]||18,imgUrl=IMAGES[d.id];
  if(imgUrl){
    el.append("defs").append("clipPath").attr("id","cp-"+d.id).append("circle").attr("r",r);
    el.append("image").attr("href",imgUrl).attr("x",-r).attr("y",-r).attr("width",r*2).attr("height",r*2).attr("clip-path","url(#cp-"+d.id+")").attr("preserveAspectRatio","xMidYMid cover");
    el.append("circle").attr("r",r).attr("fill","none").attr("stroke",COLOR[d.cat]).attr("stroke-width",2.5);
  } else {
    el.append("circle").attr("r",r).attr("fill",COLOR[d.cat]).attr("opacity",0.18);
    el.append("circle").attr("r",r).attr("fill","none").attr("stroke",COLOR[d.cat]).attr("stroke-width",2);
    el.append("text").text(d.label.split(' ').map(w=>w[0]).slice(0,4).join('')).attr("text-anchor","middle").attr("dy","0.35em").attr("fill",COLOR[d.cat]).attr("font-size",r>24?"10px":r>20?"8px":"7px").style("pointer-events","none").style("font-weight","600");}
});

const tip=document.getElementById("tooltip");
ng.on("mouseover",(e,d)=>{
  tip.style.display="block";
  let imgHtml="";
  if(IMAGES[d.id]){
    const fit=d.id==="sapol"||d.id==="sa_health"||d.id==="univ"||d.id==="epstein_maxwell"?"contain":"cover";
    imgHtml=`<img src="${IMAGES[d.id]}" style="object-fit:${fit};padding:4px">`;
  }
  tip.innerHTML=`${imgHtml}<div class="name" style="color:${COLOR[d.cat]}">${d.label}</div><div class="cat">${d.cat} · ${d.ev||""}</div><div class="desc">${d.desc}</div>`;
}).on("mousemove",e=>{tip.style.left=(e.pageX+12)+"px";tip.style.top=(e.pageY-10)+"px"}).on("mouseout",()=>tip.style.display="none").on("click",(e,d)=>{
  const det=document.getElementById("detail");
  let imgHtml="";
  if(IMAGES[d.id]){
    const fit=d.id==="sapol"||d.id==="sa_health"||d.id==="univ"||d.id==="epstein_maxwell"?"contain":"cover";
    imgHtml=`<img src="${IMAGES[d.id]}" style="width:60px;height:60px;border-radius:4px;object-fit:${fit};float:left;margin-right:1rem">`;
  }
  document.getElementById("detail-content").innerHTML=`${imgHtml}<h3 style="color:${COLOR[d.cat]}">${d.label}</h3><div class="cat">${d.cat} · ${d.ev||""}</div><div class="desc">${d.desc}</div>`;
  det.style.display="block";
});

sim.on("tick",()=>{linkG.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y).attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);ng.attr("transform",d=>`translate(${d.x},${d.y})`)});
</script>
