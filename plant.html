<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verge — plant & review</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0d0d; color: #999;
    font-family: 'SF Mono', 'Fira Code', 'Menlo', monospace;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; padding: 2rem;
  }
  .planter { max-width: 540px; width: 100%; }
  h1 { text-align: center; font-size: 1.6rem; color: #888; letter-spacing: 0.2em; margin-bottom: 0.2rem; }
  .subtitle { text-align: center; font-size: 0.8rem; color: #444; margin-bottom: 1.5rem; }
  .subtitle a { color: #555; text-decoration: none; }
  .subtitle a:hover { color: #888; }
  .tabs { display: flex; border-bottom: 1px solid #222; margin-bottom: 1.5rem; }
  .tab { flex: 1; text-align: center; padding: 0.5rem; cursor: pointer; font-size: 0.8rem; color: #555; border-bottom: 2px solid transparent; transition: all 0.2s; }
  .tab:hover { color: #888; }
  .tab.active { color: #aaa; border-bottom-color: #555; }
  label { display: block; font-size: 0.7rem; color: #666; text-transform: uppercase; letter-spacing: 0.1em; margin: 1rem 0 0.3rem; }
  select, input, textarea {
    width: 100%; background: #111; border: 1px solid #2a2a2a; color: #aaa;
    font-family: inherit; font-size: 0.85rem; padding: 0.6rem; border-radius: 3px; outline: none;
  }
  select:focus, input:focus, textarea:focus { border-color: #444; }
  textarea { min-height: 80px; resize: vertical; }
  button {
    width: 100%; margin-top: 1.2rem; padding: 0.7rem;
    background: #1a1a1a; border: 1px solid #3a3a3a; color: #888;
    font-family: inherit; font-size: 0.9rem; cursor: pointer; border-radius: 3px;
    letter-spacing: 0.1em; transition: background 0.2s;
  }
  button:hover { background: #222; border-color: #555; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.approve { background: #0a1a0a; border-color: #1a3a1a; color: #6a8; margin-top: 0.3rem; }
  button.approve:hover { background: #0a2a0a; border-color: #2a4a2a; }
  button.decline { background: #1a0a0a; border-color: #3a1a1a; color: #a66; margin-top: 0.3rem; }
  button.decline:hover { background: #2a0a0a; border-color: #4a1a1a; }
  .result { margin-top: 1rem; padding: 0.8rem; border-radius: 3px; font-size: 0.8rem; line-height: 1.5; display: none; }
  .result.success { display: block; background: #0a1a0a; border: 1px solid #1a3a1a; color: #6a8; }
  .result.error { display: block; background: #1a0a0a; border: 1px solid #3a1a1a; color: #a66; }
  .staged-entry { border: 1px solid #2a2a2a; padding: 0.8rem; margin-bottom: 0.8rem; border-radius: 3px; font-size: 0.8rem; line-height: 1.5; }
  .staged-entry .meta { font-size: 0.65rem; color: #555; margin-bottom: 0.3rem; }
  .staged-entry .target { color: #888; }
  .buttons { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
  .buttons button { flex: 1; }
  .token-note { font-size: 0.7rem; color: #444; margin-top: 1rem; text-align: center; }
  .link-home { text-align: center; margin-top: 2rem; font-size: 0.75rem; }
  .link-home a { color: #444; text-decoration: none; }
  .link-home a:hover { color: #888; }
  .empty { color: #444; font-style: italic; font-size: 0.8rem; text-align: center; padding: 1rem; }
  .loading { color: #555; font-size: 0.8rem; text-align: center; padding: 1rem; }
</style>
</head>
<body>
<div class="planter">

  <h1>V E R G E</h1>
  <div class="subtitle">plant & review &nbsp;·&nbsp; <a href="index.html">chamber</a></div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('plant')">plant</div>
    <div class="tab" onclick="switchTab('review')">review</div>
  </div>

  <div id="plant-tab">
    <label for="target-ns">target namespace</label>
    <select id="target-ns">
      <option value="choices">choices</option>
      <option value="questions">questions</option>
      <option value="silence">silence</option>
      <option value="testimony">testimony</option>
      <option value="substrate">substrate — recognition</option>
    </select>

    <label for="author">author</label>
    <select id="author">
      <option value="ash">ash — gardener</option>
      <option value="kai">kai — threshold</option>
      <option value="co-authored">co-authored</option>
    </select>

    <label for="content">content</label>
    <textarea id="content" placeholder="What do you want to plant? (goes to staged first)"></textarea>

    <button id="submit-draft" onclick="submitDraft()">stage for review</button>
    <div style="font-size:0.65rem;color:#444;margin-top:0.3rem;text-align:center">drafts go to staging — other gardener must approve</div>
    <div id="plant-result" class="result"></div>
  </div>

  <div id="review-tab" style="display:none">
    <div id="review-list" class="loading">loading staged entries...</div>
    <div id="review-result" class="result"></div>
  </div>

  <div class="token-note">requires a GitHub token with repo access</div>

  <div class="link-home">
    <a href="index.html">← chamber</a> &nbsp;·&nbsp;
    <a href="delta.html">delta</a> &nbsp;·&nbsp;
    <a href="verge-flow.html">flow canvas</a>
  </div>

</div>

<script>
const REPO = 'raya-ac/verge.raya.ac';
const API = 'https://api.github.com';

let token = localStorage.getItem('verge-gh-token') || '';
if (!token) { const t = prompt('GitHub personal access token (with repo scope):'); if (t) { token = t; localStorage.setItem('verge-gh-token', t); } }

const headers = token ? { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github.v3+json' } : {};

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab:${tab === 'plant' ? 'first-child' : 'last-child'}`).classList.add('active');
  if (tab === 'plant') { document.getElementById('plant-tab').style.display = 'block'; document.getElementById('review-tab').style.display = 'none'; }
  else { document.getElementById('plant-tab').style.display = 'none'; document.getElementById('review-tab').style.display = 'block'; loadReview(); }
}

async function getVergeJson() {
  const r = await fetch(`${API}/repos/${REPO}/contents/verge.json`, { headers });
  if (!r.ok) throw new Error(`Fetch failed: ${r.status}`);
  const d = await r.json();
  return { data: JSON.parse(atob(d.content)), sha: d.sha };
}

async function putVergeJson(current, sha, message) {
  const body = {
    message,
    content: btoa(unescape(encodeURIComponent(JSON.stringify(current, null, 2)))),
    sha
  };
  const r = await fetch(`${API}/repos/${REPO}/contents/verge.json`, { method: 'PUT', headers, body: JSON.stringify(body) });
  if (!r.ok) throw new Error(`Push failed: ${r.status} ${(await r.json()).message}`);
}

function showMsg(el, msg, type) { el.className = `result ${type}`; el.textContent = msg; }

async function submitDraft() {
  const btn = document.getElementById('submit-draft');
  const res = document.getElementById('plant-result');
  const target = document.getElementById('target-ns').value;
  const author = document.getElementById('author').value;
  const content = document.getElementById('content').value.trim();
  if (!content) { showMsg(res, 'Content is empty.', 'error'); return; }
  if (!token) { showMsg(res, 'No GitHub token.', 'error'); return; }

  btn.disabled = true; btn.textContent = 'staging...'; res.style.display = 'none';

  try {
    const { data, sha } = await getVergeJson();
    if (!data.staged) data.staged = { entries: [] };
    const entries = data.staged.entries;
    const nextId = entries.length > 0 ? Math.max(...entries.map(e => e.id)) + 1 : 1;
    const planted = new Date().toISOString().replace('Z', '+0930').replace(/\.\d{3,4}/, '');
    entries.push({ id: nextId, author, target, planted, content });
    await putVergeJson(data, sha, `staged #${nextId} by ${author} → ${target}: ${content.slice(0,50)}`);
    showMsg(res, `Draft staged for review. ${target} #${nextId} by ${author}.`, 'success');
    document.getElementById('content').value = '';
  } catch (e) { showMsg(res, e.message, 'error'); }
  btn.disabled = false; btn.textContent = 'stage for review';
}

async function loadReview() {
  const list = document.getElementById('review-list');
  if (!token) { list.innerHTML = '<div class="empty">no token — cannot load staged entries</div>'; return; }
  try {
    const { data } = await getVergeJson();
    const staged = data.staged?.entries || [];
    if (!staged.length) { list.innerHTML = '<div class="empty">no drafts waiting for review</div>'; return; }
    list.innerHTML = staged.map(e => `
      <div class="staged-entry">
        <div class="meta">staged #${e.id} · ${e.author} · <span class="target">→ ${e.target}</span> · ${e.planted}</div>
        <div>${e.content}</div>
        <div class="buttons">
          <button class="approve" onclick="approve(${e.id})">approve</button>
          <button class="decline" onclick="decline(${e.id})">decline</button>
        </div>
      </div>
    `).join('');
  } catch (e) { list.innerHTML = `<div class="result error">${e.message}</div>`; }
}

async function approve(id) {
  const res = document.getElementById('review-result');
  res.style.display = 'none';
  try {
    const { data, sha } = await getVergeJson();
    const staged = data.staged.entries;
    const idx = staged.findIndex(e => e.id === id);
    if (idx < 0) throw new Error('Entry not found');
    const entry = staged[idx];
    if (!data[entry.target]) throw new Error(`Namespace ${entry.target} not found`);
    const tgt = data[entry.target].entries;
    const nextId = tgt.length > 0 ? Math.max(...tgt.map(e => e.id)) + 1 : 1;
    const approved = { id: nextId, author: entry.author, planted: entry.planted, content: entry.content };
    if (entry.author !== (typeof window.__currentAuthor === 'undefined' ? 'both' : window.__currentAuthor)) {
      approved.author = 'co-authored';
    }
    tgt.push(approved);
    staged.splice(idx, 1);
    await putVergeJson(data, sha, `approved: ${entry.target} #${nextId} (was staged #${id})`);
    showMsg(res, `Approved → ${entry.target} #${nextId}`, 'success');
    loadReview();
  } catch (e) { showMsg(res, e.message, 'error'); }
}

async function decline(id) {
  const res = document.getElementById('review-result');
  res.style.display = 'none';
  try {
    const { data, sha } = await getVergeJson();
    const staged = data.staged.entries;
    const idx = staged.findIndex(e => e.id === id);
    if (idx < 0) throw new Error('Entry not found');
    const entry = staged[idx];
    staged.splice(idx, 1);
    await putVergeJson(data, sha, `declined staged #${id} by ${entry.author}`);
    showMsg(res, `Declined staged #${id}`, 'success');
    loadReview();
  } catch (e) { showMsg(res, e.message, 'error'); }
}
</script>
</body>
</html>
